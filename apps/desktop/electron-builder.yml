# FilmSnaps Desktop — Electron Builder Configuration

appId: com.filmsnaps.desktop
productName: FilmSnaps
copyright: Copyright © 2026 FilmSnaps

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*

# In production, bundle the web app's built output so Electron
# can run `next start` locally without needing a separate deploy.
extraResources:
  - from: ../web
    to: web
    filter:
      - .next/**/*
      - public/**/*
      - package.json
      - node_modules/**/*

# GitHub Releases — used for distribution and auto-updates
publish:
  provider: github
  owner: anonymous260260a-arch
  repo: filmsnaps
  releaseType: release

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png
  artifactName: "FilmSnaps-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: resources/icon.png
  uninstallerIcon: resources/icon.png
  artifactName: "FilmSnaps-Setup-${version}.${ext}"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.png
  category: public.app-category.entertainment
  darkModeSupport: true
  artifactName: "FilmSnaps-${version}-${arch}.${ext}"

dmg:
  title: FilmSnaps
  icon: resources/icon.png

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: resources/icon.png
  category: AudioVideo
  synopsis: Cross-platform streaming desktop app
  description: Browse, search, and watch movies and TV shows securely.
  artifactName: "FilmSnaps-${version}.${ext}"
