# FilmSnaps Desktop — Electron Builder Configuration

appId: com.filmsnaps.desktop
productName: FilmSnaps
copyright: Copyright © 2026 FilmSnaps

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - resources/**/*

# In production, bundle the web app's Next.js standalone output
# so Electron can serve the app locally. The standalone output
# includes the server + all necessary node_modules + static files.
extraResources:
  - from: ../web/.next/standalone
    to: web
  - from: ../web/public
    to: web/apps/web/public

# GitHub Releases — used for distribution and auto-updates
publish:
  provider: github
  owner: anonymous260260a-arch
  repo: filmsnaps
  releaseType: release

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "FilmSnaps-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: "FilmSnaps-Setup-${version}.${ext}"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.entertainment
  darkModeSupport: true
  artifactName: "FilmSnaps-${version}-${arch}.${ext}"

dmg:
  title: FilmSnaps

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: AudioVideo
  synopsis: Cross-platform streaming desktop app
  description: Browse, search, and watch movies and TV shows securely.
  artifactName: "FilmSnaps-${version}.${ext}"
