<script>
  window.infoEvent = document.createEvent("Event");
  window.infoEvent.initEvent("infoEvent", true, true);
  const urlParams = new URLSearchParams(window.location.search);
  let paramObj = Object.fromEntries(urlParams.entries());
  if(window.location.pathname.startsWith("/embed/movie")){
    paramObj["type"] = "movie"
  }else{
    paramObj["type"] = "tv"
  }
  paramObj["type"] = paramObj["type"] || props.type;
  let url =  "/api/v1/s?" + new URLSearchParams(paramObj).toString();
  fetch(url)
    .then(response => {
      if (!response.ok) {
        response.json().then((error) => {
          window.sErr = error.error || "Error getting server list.";
          document.dispatchEvent(window.infoEvent);
          window.hasInfo = true
        }).catch(() => {
          window.sErr = "Error getting server list.";
          document.dispatchEvent(window.infoEvent);
          window.hasInfo = true
        })
      }else{
        response.json().then((res) => {
          window.sInfo = res
          document.dispatchEvent(window.infoEvent);
          window.hasInfo = true
        })
      }
    })
    .catch(error => console.log('Request failed', error));
</script>
<div id="embed-root"></div>
