<!DOCTYPE html>
<html lang="en">
<head>
  <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool@latest'></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/devtools-detector/2.0.17/devtools-detector.js"></script>
  <script src="https://www.vidsrc.wtf/js/protected_devtoolsdetector.js" defer></script>
  <script src="https://www.vidsrc.wtf/js/nocheats.js" defer></script>
  <script src="https://www.vidsrc.wtf/js/path.js" defer></script>
  <script src="https://www.vidsrc.wtf/js/mercury.js" type="text/javascript" data-cfasync="false"></script>
  <title>VidSrc.wtf Api 5</title>
  <script src="../../../js/fubuki.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #videoContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #target {
            width: 100%;
            height: 100%;
        }

        #controls {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        #serverSelect {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 1px solid #333;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        #serverSelect option {
            background: #333;
        }

        #serverSelect:focus {
            outline: none;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1f1f1f;
        }

        ::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555555;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 20px;
            border-radius: 5px;
            white-space: nowrap;
            z-index: 1001;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid #fff;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex: none;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #loading.hidden {
            display: none;
        }

        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
            z-index: 1002;
            display: none;
            max-width: 80%;
        }

        #messageBox.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="videoContainer">
        <iframe id="target" frameborder="0" allowfullscreen></iframe>
        <div id="controls">
            <select id="serverSelect"></select>
        </div>
        <div id="loading">
            FETCHING, ONE MOMENT...
            <div class="spinner"></div>
        </div>
        <div id="messageBox"></div>
    </div>

    <script>
        function showMessage(message) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = message;
            messageBox.classList.add('show');
            setTimeout(() => {
                messageBox.classList.remove('show');
            }, 4000);
        }

        async function fetchMovieLinks(tmdbId) {
            const loadingElement = document.getElementById('loading');
            loadingElement.classList.remove('hidden');

            try {
                const response = await fetch(`https://api.rgshows.ru/premium_embeds/movie/${tmdbId}`);
                const data = await response.json();

                if (!data.links || data.links.length === 0) {
                    console.error("No links found");
                    showMessage("No playable streams found");
                    return;
                }

                const select = document.getElementById("serverSelect");
                const iframe = document.getElementById("target");

                // Populate dropdown with server options
                data.links.forEach((link, index) => {
                    const option = document.createElement("option");
                    option.value = link.url;
                    option.textContent = link.host;
                    select.appendChild(option);
                });

                // Load first link by default
                iframe.src = select.value;

                // Change stream on dropdown selection
                select.addEventListener("change", () => {
                    loadingElement.classList.remove('hidden');
                    iframe.src = select.value;
                    // Add event listener to hide loading when iframe loads
                    iframe.onload = () => {
                        loadingElement.classList.add('hidden');
                    };
                });

            } catch (error) {
                console.error("Error fetching movie links:", error);
                showMessage("An error occurred while loading the content");
            } finally {
                loadingElement.classList.add('hidden');
            }
        }

        // Extract ID from URL and fetch data
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const tmdbId = urlParams.get("id");
            if (tmdbId) {
                fetchMovieLinks(tmdbId);
            } else {
                console.error("No TMDB ID provided");
                document.getElementById('loading').classList.add('hidden');
                showMessage("No TMDB ID provided in URL");
            }
        });
    </script>
  </body>
  </html>
