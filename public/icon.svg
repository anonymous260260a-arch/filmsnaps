<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="50%" stop-color="#0f0f16"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect x="4" y="4" width="504" height="504" rx="108" fill="none" stroke="rgba(167,139,250,0.15)" stroke-width="2"/>
  <!-- Film frame strip - left -->
  <rect x="80" y="80" width="24" height="352" rx="6" fill="url(#accent)" opacity="0.3"/>
  <!-- Film frame strip - right -->
  <rect x="408" y="80" width="24" height="352" rx="6" fill="url(#accent)" opacity="0.3"/>
  <!-- Top film sprocket holes -->
  <rect x="48" y="100" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="104" y="100" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="160" y="100" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="216" y="100" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="272" y="100" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="328" y="100" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="384" y="100" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <!-- Bottom film sprocket holes -->
  <rect x="48" y="400" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="104" y="400" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="160" y="400" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="216" y="400" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="272" y="400" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="328" y="400" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <rect x="384" y="400" width="16" height="12" rx="3" fill="url(#accent)" opacity="0.5"/>
  <!-- Play button triangle -->
  <polygon points="210,170 210,342 340,256" fill="url(#accent)" opacity="0.9"/>
  <!-- Play triangle inner glow -->
  <polygon points="218,180 218,332 328,256" fill="url(#accent2)" opacity="0.4"/>
</svg>
